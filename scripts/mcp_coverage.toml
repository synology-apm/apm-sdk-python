# mcp_coverage.toml — SDK → MCP tool coverage manifest.
#
# Every SDK public method must appear in exactly one [[mapping]] or [[not_exposed]] entry.
# `make test` runs `scripts/check_mcp_coverage.py` to verify this.
#
# [[mapping]]   sdk_path is exposed as mcp_tool at the given mode.
# [[not_exposed]] sdk_path is explicitly excluded with a reason.

# ── System ────────────────────────────────────────────────────────────────────

[[mapping]]
sdk_path = "get_site_info"
mcp_tool  = "get_site_info"
mode      = "readonly"

# ── Backup Servers ────────────────────────────────────────────────────────────

[[mapping]]
sdk_path = "backup_servers.list"
mcp_tool  = "list_backup_servers"
mode      = "readonly"

[[mapping]]
sdk_path = "backup_servers.get"
mcp_tool  = "get_backup_server"
mode      = "readonly"

[[not_exposed]]
sdk_path = "backup_servers.get_by_name"
reason   = "internal resolution alias; covered by get_backup_server (name parameter)"

[[mapping]]
sdk_path = "backup_servers.change_tiering_plan"
mcp_tool  = "change_backup_server_tiering_plan"
mode      = "admin"

