name = "apm-activity"
description = "Inspect Synology ActiveProtect Manager (APM) backup and restore activity history: list ongoing or completed activities with status/type/time filters, view detailed activity logs, and cancel running backup/restore activities. Use for any synology-apm CLI task about job status, history, progress, or cancelling an in-progress backup or restore."
title = "synology-apm activity — Backup / Restore Activity History"

intro = """
Activities are split into **backup** and **restore**, each with `list`, `get`, and
`cancel`. By default `list` shows ongoing activities; pass `--history` for completed
ones.

See [apm-shared](../apm-shared/SKILL.md) for global options, output formats, and
confirmation rules.
"""

commands = [
  "activity backup list",
  "activity backup get",
  "activity backup cancel",
  "activity restore list",
  "activity restore get",
  "activity restore cancel",
]

tips = """
- `get` without `--id` searches by workload `NAME` and returns its latest activity.
- Filter `list` by `--status` (repeatable), `--search` (keyword), or a
  `--since`/`--until` time range.
- `activity backup list` additionally supports `--machine-type`/`--m365-type`
  (repeatable) and `--namespace` (repeatable, backup server namespace); these are not
  available for `activity restore list`.
- `cancel` requires `--id <activity-id>` (from `list`) and prompts for confirmation —
  confirm with the user, then pass `--yes` to proceed.
"""

see_also = """
- [apm-shared](../apm-shared/SKILL.md) — global options, output formats, confirmation rules
- [apm-machine](../apm-machine/SKILL.md) — trigger/cancel backups for Machine workloads
- [apm-m365](../apm-m365/SKILL.md) — trigger/cancel backups for M365 workloads
"""
