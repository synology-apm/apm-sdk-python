name = "apm-machine"
description = "Manage Synology ActiveProtect Manager (APM) Machine workloads — PCs, Physical Servers (PS), Virtual Machines (VM), and File Servers (FS): list/search workloads, view details, trigger or cancel on-demand backups, retire workloads, and manage backup version history (list/get/lock/unlock). Use for any synology-apm CLI task involving PCs, physical servers, VMs, or file servers."
title = "synology-apm machine — Machine Workload Operations"

intro = """
Machine workloads cover PCs (`pc`), Physical Servers (`ps`), Virtual Machines (`vm`),
and File Servers (`fs`). Most commands support two modes:

- **Search mode**: pass a workload `NAME` (hostname); the CLI looks it up among
  protected workloads (or retired workloads, with `--retired`).
- **Direct mode**: pass `--id <workload-id> --namespace <ns>` to skip the lookup.
  Get the namespace from `synology-apm infra server list --verbose`.

See [apm-shared](../apm-shared/SKILL.md) for global options, output formats, and
confirmation rules.
"""

commands = [
  "machine list",
  "machine get",
  "machine backup",
  "machine cancel",
  "machine retire",
  "machine change-plan",
  "machine version list",
  "machine version get",
  "machine version lock",
  "machine version unlock",
]

tips = """
- `synology-apm machine retire` requires `--plan <archive-plan-id>` — find IDs with
  `synology-apm plan retirement list --verbose`.
- After retiring a workload, use `synology-apm machine change-plan` to assign or change its
  retirement plan, and `synology-apm machine get --retired` / `synology-apm machine version list --retired`
  to inspect it.
- To find a workload's ID and namespace for direct mode, run
  `synology-apm machine get "<name>" -o json` (search mode) and read the `workload_id` and
  `namespace` fields.
"""

see_also = """
- [apm-shared](../apm-shared/SKILL.md) — global options, output formats, confirmation rules
- [apm-plan](../apm-plan/SKILL.md) — Protection/Retirement plan list and details
- [apm-activity](../apm-activity/SKILL.md) — inspect backup/restore activity in detail
"""
