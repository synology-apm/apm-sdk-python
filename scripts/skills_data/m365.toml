name = "apm-m365"
description = "Manage Synology ActiveProtect Manager (APM) Microsoft 365 workloads — Exchange mailboxes, OneDrive, Teams Chat, SharePoint sites, Teams, and M365 Groups: list/search workloads, view details, trigger or cancel on-demand backups, retire workloads, manage backup version history, export Exchange/Group mailboxes to PST, and list connected SaaS tenants. Use for any synology-apm CLI task involving M365 / Office 365 data."
title = "synology-apm m365 — Microsoft 365 Workload Operations"

intro = """
M365 workloads come in six types: Exchange mailboxes, OneDrive accounts, Teams chats
(`chat`), SharePoint sites, Teams, and M365 Groups. The commands below are shown for
`exchange`; the same commands work for every type — see "Other M365 Workload Types"
at the end of this skill.

Most commands support two modes:

- **Search mode**: pass a `NAME` (mailbox UPN, site name, etc.); the CLI looks it up
  among protected workloads of that type for the resolved tenant (or retired
  workloads, with `--retired`).
- **Direct mode**: pass `--id <uid> --namespace <ns>` to skip the lookup
  (`--tenant-id` is not required in direct mode).

See [apm-shared](../apm-shared/SKILL.md) for global options, output formats, and
confirmation rules.
"""

canonical_scope = "exchange"

commands = [
  "m365 exchange list",
  "m365 exchange get",
  "m365 exchange backup",
  "m365 exchange cancel",
  "m365 exchange retire",
  "m365 exchange change-plan",
  "m365 exchange version list",
  "m365 exchange version get",
  "m365 exchange version lock",
  "m365 exchange version unlock",
  "m365 exchange export list",
  "m365 exchange export cancel",
  "m365 exchange export download",
]

tips = """
- `synology-apm m365 exchange retire` requires `--plan <archive-plan-id>` — find IDs with
  `synology-apm plan retirement list --verbose`.
- `export download` without `--id` starts a new export and waits for it to finish
  before downloading; pass `--no-wait` to start it and return immediately, then
  download later with `--id <activity-id>` from `export list`.
- `--archive-mailbox` on `export download` only applies to Exchange mailboxes.
"""

see_also = """
- [apm-shared](../apm-shared/SKILL.md) — global options, output formats, confirmation rules
- [apm-plan](../apm-plan/SKILL.md) — Protection/Retirement plan list and details
- [apm-activity](../apm-activity/SKILL.md) — inspect backup/restore activity in detail
"""

[scopes.exchange]
example_name = "alice@contoso.com"
identifier = "mailbox UPN"
has_export = true

[scopes.onedrive]
example_name = "alice@contoso.com"
identifier = "user UPN"
has_export = false

[scopes.chat]
example_name = "alice@contoso.com"
identifier = "user UPN"
has_export = false

[scopes.sharepoint]
example_name = "HR Site"
identifier = "site name"
has_export = false

[scopes.teams]
example_name = "Engineering"
identifier = "team name"
has_export = false

[scopes.group]
example_name = "marketing@contoso.com"
identifier = "group email"
has_export = true

[[extra_sections]]
heading = "Tenant Resolution"
body = """
Most M365 workload commands accept `--tenant-id`/`-t`. In search mode, omitting it
auto-uses the first connected M365 tenant — fine with a single tenant, ambiguous with
multiple. Use `synology-apm saas list` to find tenant IDs:
"""
commands = ["saas list"]
