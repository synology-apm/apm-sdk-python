[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "synology-apm-sdk"
version = "0.2.0"
description = "Async Python SDK for Synology ActiveProtect Manager"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "Synology Inc." },
]
requires-python = ">=3.11"
keywords = ["synology", "activeprotect", "backup", "apm", "sdk"]
classifiers = [
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Systems Administration",
]
dependencies = [
    "aiohttp>=3.9",
    "keyring>=25.0",
    "tomli-w>=1.0",
]

[project.urls]
Homepage = "https://www.synology.com/products/ActiveProtectAppliance"
Repository = "https://github.com/synology-apm/apm-sdk-python"
Documentation = "https://synology-apm.github.io/apm-sdk-python/"
"Issue Tracker" = "https://github.com/synology-apm/apm-sdk-python/issues"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
