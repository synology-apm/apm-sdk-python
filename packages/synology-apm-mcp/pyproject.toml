[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "synology-apm-mcp"
version = "0.2.0"
description = "MCP server for Synology ActiveProtect Manager, built on synology-apm-sdk"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "Synology Inc." },
]
requires-python = ">=3.11"
keywords = ["synology", "activeprotect", "backup", "apm", "mcp"]
classifiers = [
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Systems Administration",
]
dependencies = [
    "synology-apm-sdk==0.2.0",
    "fastmcp>=2.0",
]

[project.urls]
Homepage = "https://www.synology.com/products/ActiveProtectAppliance"
Repository = "https://github.com/synology-apm/apm-sdk-python"
Documentation = "https://synology-apm.github.io/apm-sdk-python/"
"Issue Tracker" = "https://github.com/synology-apm/apm-sdk-python/issues"

[project.scripts]
synology-apm-mcp = "synology_apm.mcp.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.uv.sources]
synology-apm-sdk = { workspace = true }
