# Quality gate on every push and pull request — `make test` (unit tests with
# coverage threshold, integration-suite collection, lint, mypy, skills check).
# release.yml reuses this workflow (workflow_call) so a release re-verifies the
# same gate first.
name: CI

on:
  push:
    branches: ['**']   # branches only — tag pushes run this via release.yml instead
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache mypy and ruff caches
        uses: actions/cache@v4
        with:
          path: |
            .mypy_cache
            .ruff_cache
          key: typecheck-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            typecheck-${{ runner.os }}-

      # Same command as the local pre-commit gate — the Makefile is the single
      # source of truth for what CI runs. Cassettes are gitignored and absent on
      # CI, so every integration test skips; that step only verifies the suite
      # still collects and imports cleanly.
      - name: Quality gate (make test)
        env:
          NO_COLOR: "1"
          TERM: "dumb"
        run: make test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14
