name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check packages/synology-apm-sdk/src packages/synology-apm-cli/src tests examples scripts

      - name: Cache mypy and ruff caches
        uses: actions/cache@v4
        with:
          path: |
            .mypy_cache
            .ruff_cache
          key: typecheck-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            typecheck-${{ runner.os }}-

      - name: Type check
        run: uv run mypy

      - name: Unit tests (with coverage)
        run: uv run pytest tests/unit/ --cov=synology_apm.sdk --cov=synology_apm.cli -q

      # Cassettes are gitignored and absent on CI, so every integration test skips;
      # this step only verifies the suite still collects and imports cleanly, and
      # keeps the CI command aligned with `make test`.
      - name: Integration tests (cassette replay; skips without cassettes)
        run: uv run pytest tests/integration/ --record-mode=none --import-mode=importlib -q

      - name: Verify generated skills are up to date
        run: uv run python scripts/generate_skills.py --check
