# Builds and publishes synology-apm-sdk, synology-apm-cli, and synology-apm-mcp to PyPI
# for the pushed tag.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read   # publish-* jobs elevate their own

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Same gate as every push — a tag must never ship code that would fail CI.
  test:
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true

      - name: Build synology-apm-sdk
        run: uv build --package synology-apm-sdk -o dist/synology-apm-sdk

      - name: Build synology-apm-cli
        run: uv build --package synology-apm-cli -o dist/synology-apm-cli

      - name: Build synology-apm-mcp
        run: uv build --package synology-apm-mcp -o dist/synology-apm-mcp

      - name: Upload synology-apm-sdk dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-synology-apm-sdk
          path: dist/synology-apm-sdk/

      - name: Upload synology-apm-cli dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-synology-apm-cli
          path: dist/synology-apm-cli/

      - name: Upload synology-apm-mcp dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-synology-apm-mcp
          path: dist/synology-apm-mcp/

  # The wheels are installed and exercised before anything reaches PyPI —
  # PyPI uploads are immutable, so a broken artifact would burn the version.
  verify-dist:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download synology-apm-sdk dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-synology-apm-sdk
          path: dist/synology-apm-sdk

      - name: Download synology-apm-cli dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-synology-apm-cli
          path: dist/synology-apm-cli

      - name: Download synology-apm-mcp dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-synology-apm-mcp
          path: dist/synology-apm-mcp

      - name: Verify wheel versions match the tag
        run: |
          V="${GITHUB_REF_NAME#v}"
          ls dist/synology-apm-sdk/synology_apm_sdk-"$V"-py3-none-any.whl
          ls dist/synology-apm-cli/synology_apm_cli-"$V"-py3-none-any.whl
          ls dist/synology-apm-mcp/synology_apm_mcp-"$V"-py3-none-any.whl

      - name: Install wheels and smoke-run the CLI
        run: |
          python3 -m venv .venv-smoke-cli
          .venv-smoke-cli/bin/pip install --quiet \
            dist/synology-apm-sdk/*.whl dist/synology-apm-cli/*.whl
          .venv-smoke-cli/bin/python -c "import synology_apm.sdk, synology_apm.cli"
          .venv-smoke-cli/bin/synology-apm-cli --help

      - name: Install wheels and smoke-run the MCP server
        run: |
          python3 -m venv .venv-smoke-mcp
          .venv-smoke-mcp/bin/pip install --quiet \
            dist/synology-apm-sdk/*.whl dist/synology-apm-mcp/*.whl
          .venv-smoke-mcp/bin/python -c "import synology_apm.sdk, synology_apm.mcp"
          .venv-smoke-mcp/bin/synology-apm-mcp --help

  publish-sdk:
    needs: [build, verify-dist]
    runs-on: ubuntu-latest
    environment:
      name: pypi-synology-apm-sdk
      url: https://pypi.org/p/synology-apm-sdk
    permissions:
      id-token: write
    steps:
      - name: Download synology-apm-sdk dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-synology-apm-sdk
          path: dist/synology-apm-sdk

      - name: Publish synology-apm-sdk to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: dist/synology-apm-sdk

  publish-cli:
    needs: [build, publish-sdk]
    runs-on: ubuntu-latest
    environment:
      name: pypi-synology-apm-cli
      url: https://pypi.org/p/synology-apm-cli
    permissions:
      id-token: write
    steps:
      - name: Download synology-apm-cli dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-synology-apm-cli
          path: dist/synology-apm-cli

      - name: Publish synology-apm-cli to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: dist/synology-apm-cli

  # publish-mcp runs in parallel with publish-cli — both depend only on publish-sdk.
  publish-mcp:
    needs: [build, publish-sdk]
    runs-on: ubuntu-latest
    environment:
      name: pypi-synology-apm-mcp
      url: https://pypi.org/p/synology-apm-mcp
    permissions:
      id-token: write
    steps:
      - name: Download synology-apm-mcp dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-synology-apm-mcp
          path: dist/synology-apm-mcp

      - name: Publish synology-apm-mcp to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: dist/synology-apm-mcp
