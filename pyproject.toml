[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
    "aioresponses>=0.7",
    "aiohttp<3.14",  # aioresponses 0.7.8 is incompatible with aiohttp's new required stream_writer kwarg
    "pytest-mock>=3.12",
    "mypy>=1.8",
    "ruff>=0.3",
    "pytest-recording>=0.13",
    "vcrpy>=6.0",
    "python-dotenv>=1.0",
    "pytest-cov>=4.1",
    "pyyaml>=6.0",
    "types-pyyaml>=6.0",
    "openpyxl>=3.1",
    "types-openpyxl>=3.1",
]
docs = [
    "sphinx>=7.0",
    "furo>=2024.1",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: marks tests as integration tests (require live APM server)",
]

[tool.mypy]
python_version = "3.11"
strict = true
explicit_package_bases = true
namespace_packages = true
mypy_path = ["packages/synology-apm-sdk/src", "packages/synology-apm-cli/src", "examples", "scripts"]
files = [
    "packages/synology-apm-sdk/src",
    "packages/synology-apm-cli/src",
    "examples",
    "scripts",
    "tests",
]

[tool.ruff]
target-version = "py311"
line-length = 120
src = [".", "packages/synology-apm-sdk/src", "packages/synology-apm-cli/src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["E501"]

[tool.coverage.report]
fail_under = 95
